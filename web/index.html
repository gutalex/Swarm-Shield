<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Swarm-Shield 3D HTML</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        #info {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: #fff; font-family: monospace; font-size: 16px; pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<div id="info">Swarm-Shield WebGL<br>Крути мышкой!</div>
<script>
    const scene = new THREE.Scene();
    scene.add(new THREE.GridHelper(1000, 20, 0x444444, 0x222222));

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 3000);
    camera.position.set(0, 400, 600);

    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);

    // База
    const baseMesh = new THREE.Mesh(
        new THREE.SphereGeometry(10, 16, 16),
        new THREE.MeshBasicMaterial({color: 0xff0000})
    );
    scene.add(baseMesh);

    const numTargets = 8;
    const numInterceptors = 8;
    const center = new THREE.Vector3(0,0,0);

    const targets = [];
    const tGeo = new THREE.SphereGeometry(4, 16, 16);
    const tMat = new THREE.MeshBasicMaterial({color: 0x888888});

    for(let i=0; i<numTargets; i++) {
        const a = Math.random() * Math.PI * 2;
        const d = 500 + Math.random() * 200;
        const h = 20 + Math.random() * 60;
        const mesh = new THREE.Mesh(tGeo, tMat);
        mesh.position.set(Math.cos(a)*d, h, Math.sin(a)*d);
        targets.push({ mesh, speed: 20 + Math.random()*10 });
        scene.add(mesh);
    }

    const interceptors = [];
    const iGeo = new THREE.ConeGeometry(3, 12, 8);
    iGeo.rotateX(Math.PI / 2); // Острием вперед
    const iMat = new THREE.MeshBasicMaterial({color: 0x00ff00});
    const lines = [];
    const lMat = new THREE.LineBasicMaterial({color: 0xff0000, transparent: true, opacity: 0.5});

    for(let i=0; i<numInterceptors; i++) {
        const mesh = new THREE.Mesh(iGeo, iMat);
        mesh.position.set(0,0,0);
        interceptors.push({ mesh, speed: 50, assigned: -1 });
        scene.add(mesh);

        const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]), lMat);
        lines.push(line);
        scene.add(line);
    }

    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.1);

        // Движение врагов
        targets.forEach(t => {
            const dir = new THREE.Vector3().subVectors(center, t.mesh.position).normalize();
            t.mesh.position.addScaledVector(dir, t.speed * dt);
            t.mesh.position.x += (Math.random()-0.5)*1.5;
            t.mesh.position.z += (Math.random()-0.5)*1.5;
        });

        // Простое жадное распределение целей (вместо Венгерского для скорости JS)
        let used = new Set();
        interceptors.forEach((int) => {
            let minD = Infinity, bestT = -1;
            targets.forEach((t, j) => {
                if(used.has(j)) return;
                let d = int.mesh.position.distanceTo(t.mesh.position);
                if(d < minD) { minD = d; bestT = j; }
            });
            if(bestT !== -1) {
                int.assigned = bestT;
                used.add(bestT);
            }
        });

        // Полет ПВО
        interceptors.forEach((int, i) => {
            if(int.assigned !== -1) {
                const targetPos = targets[int.assigned].mesh.position;
                const d = int.mesh.position.distanceTo(targetPos);
                if(d > 2) {
                    const dir = new THREE.Vector3().subVectors(targetPos, int.mesh.position).normalize();
                    int.mesh.position.addScaledVector(dir, Math.min(int.speed * dt, d));
                    int.mesh.lookAt(targetPos);
                }
                lines[i].geometry.setFromPoints([int.mesh.position, targetPos]);
            }
        });

        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
